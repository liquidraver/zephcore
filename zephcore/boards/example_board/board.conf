# ============================================================================
#  ZephCore — Universal board.conf Template
# ============================================================================
#
#  This file is ONLY for settings that cannot be auto-detected from devicetree
#  or Kconfig conditionals. Most hardware features are auto-enabled:
#
#    Feature          Auto-detected from
#    ───────────────  ──────────────────────────────────────────────────
#    Display          DT chosen node: zephyr,display
#    Buzzer + PWM     DT nodelabel: buzzer (compatible "pwm-leds")
#    QSPI flash       DT node: compatible "nordic,qspi-nor"
#    SPI (LR1110)     Kconfig: ZEPHCORE_RADIO_LR1110 selects SPI
#    RX duty cycle    Kconfig: auto-enabled for companion + SX1262/LLCC68
#    Sensors          DT: I2C scan at runtime
#    GPS              DT: GNSS compatible string on UART
#
#  Config chain (later files override earlier):
#    prj.conf → zephcore_common.conf → <platform>_common.conf → THIS FILE
#
#  Platform configs are auto-selected in CMakeLists.txt based on BOARD name:
#    nrf52  → nrf52_common.conf     (UF2, USB CDC, DLE, RTT)
#    nrf54l → nrf54l_common.conf    (DLE, RTT)
#    mg24   → mg24_common.conf      (SiLabs blob stacks, larger heap)
#    esp32  → esp32_common.conf     (Espressif blob stacks, larger heap)
#
#  DO NOT duplicate settings from the common configs!
#
#  IMPORTANT: Register your board in CMakeLists.txt!
#  Add "OR BOARD MATCHES \"your_board\"" to the correct platform detection
#  line (~line 60-75) so the right <platform>_common.conf is auto-included.
#
# ============================================================================

# ========== REQUIRED: Board Identity ==========
# Name shown on phone app and OLED top bar
CONFIG_ZEPHCORE_BOARD_NAME="My Board"

# BLE Device Information Service model name (shown in phone settings)
CONFIG_BT_DIS_MODEL_NUMBER_STR="My Board v1"

# ========== REQUIRED (nRF52 only): SoftDevice Firmware ID ==========
# Determines the app start address — MUST match your bootloader's SoftDevice.
# Wrong value = bootloop / bricked device with no USB/BLE/logs.
#
# Check the Arduino variant's platformio.ini for which linker script it uses:
#   nrf52840_s140_v6*.ld → 0x00B6 (app@0x26000)
#   nrf52840_s140_v7*.ld → 0x0123 (app@0x27000)
#
# CONFIG_ZEPHCORE_SD_FWID=0x00B6   # s140 v6.1.1 (RAK4631, ThinkNode M1/M3)
# CONFIG_ZEPHCORE_SD_FWID=0x0123   # s140 v7.3.0 (XIAO nRF52, Wio Tracker, T1000-E)

# ========== OPTIONAL: Radio Type ==========
# Default: RADIO_NATIVE (SX126x, SX127x, LLCC68, STM32WL) — no setting needed.
# Override ONLY for LR11xx boards (SPI is auto-selected):
# CONFIG_ZEPHCORE_RADIO_LR1110=y

# ========== OPTIONAL: Max Contacts Override ==========
# Default is 350 (Kconfig). Override for RAM-constrained boards:
#   nRF52840 + QSPI:  510  (ample storage)
#   nRF52840:          350  (default, no override needed)
#   ESP32-C6:          350  (default, no override needed)
#   nRF54L15:          450  (FLPR core reserves 68KB SRAM)
#   ESP32-C3:          300  (limited DRAM)
#   MG24:              350  (default, Silabs blob uses 32KB heap)
# CONFIG_ZEPHCORE_MAX_CONTACTS=450

# ========== OPTIONAL: Display Heap Override ==========
# The CFB framebuffer is allocated via k_malloc at boot.
# Default heap (2048 in zephcore_common.conf) fits 128x64 OLEDs.
# Larger displays WILL fail silently (-ENOMEM, blank screen).
#
#   Display         Resolution  Framebuffer   Heap needed
#   SSD1306/SH1106  128x64      1024 bytes    2048 (default)
#   SSD1681         200x200     5000 bytes    6144+
#   SSD1680         296x128     4736 bytes    6144+
#
# CONFIG_HEAP_MEM_POOL_SIZE=6144
#
# On RAM-constrained MCUs (nRF52840 + large display), you may also need:
# CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=1024   # Shrink RTT buffer (saves 3KB)

# ========== OPTIONAL: ESP32 Flash Size Override ==========
# esp32_common.conf defaults to 4MB flash. Override for boards with more:
# CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y

# ========== OPTIONAL: TX Power Override (boards with external PA) ==========
# Default: 22 dBm (SX1262 max). Override for boards with external PA
# to prevent overdriving:
# CONFIG_ZEPHCORE_DEFAULT_TX_POWER_DBM=15   # e.g., Station G2 (20dB PA)
# CONFIG_ZEPHCORE_MAX_TX_POWER_DBM=19       # Hard cap

# ========== OPTIONAL: UART Async API (nRF52840 GPS boards) ==========
# Enable if your board has a GPS module on UART with deferred-init
# (i.e., GPS power is controlled by external GPIOs, not the GNSS driver).
#
# The nRF52840 UARTE is DMA-based. The default ISR modem backend
# emulates byte-by-byte interrupts on top of DMA, which breaks when GPS
# data arrives before the ISR handler is enabled.
#
# WHEN TO ENABLE:
#   - Your board uses quectel,lc76g with zephyr,deferred-init
#   - GPS module starts transmitting before modem_pipe_open() is called
#
# WHEN NOT NEEDED:
#   - luatos,air530z driver (manages power internally via on-off-gpios)
#   - GPS at 9600 baud (slow enough for ISR backend)
#   - Boards where the GNSS driver controls power (no deferred-init)
#
# CONFIG_UART_ASYNC_API=y
